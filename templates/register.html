{% extends "base.html" %}

{% block title %}Register - CodeRealm{% endblock %}

{% block content %}
<main class="login-page">
    <div class="login-container">
        <h2 class="login-title">Create your CodeRealm account</h2>
        <form id="register-form" action="{{ url_for('register') }}" method="post" class="login-form">
            <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" name="username" required>
            </div>
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" required>
            </div>
            <button type="submit" class="login-button">Register</button>
        </form>
        <p class="signup-link">
            Already have an account? <a href="{{ url_for('login') }}">Log in here!</a>
        </p>
    </div>
</main>
{% endblock %}
