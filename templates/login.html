{% extends "base.html" %}

{% block title %}Login - CodeRealm{% endblock %}

{% block content %}
<main class="login-page">
    <div class="login-container">
        <h2 class="login-title">Log in to CodeRealm</h2>
        <form id="login-form" action="{{ url_for('login') }}" method="post" class="login-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required>
            </div>
            <button type="submit" class="login-button">Log In</button>
        </form>
        <p class="signup-link">
            Don't have an account? <a href="{{ url_for('register') }}">Sign up now!</a>
        </p>
    </div>
</main>
{% endblock %}
